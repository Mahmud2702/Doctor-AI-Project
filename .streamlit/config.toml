# ═══════════════════════════════════════════════════════════════════════════
# .streamlit/config.toml
# Locks the app to the dark theme and removes Streamlit's own chrome
# (hamburger menu, Light/Dark/System toggle, Deploy button, status widget).
# ═══════════════════════════════════════════════════════════════════════════

[theme]
base                = "dark"
primaryColor        = "#3A8BFF"
backgroundColor      = "#060608"
secondaryBackgroundColor = "#0d1016"
textColor            = "#F4F6F9"
font                 = "sans serif"

[client]
toolbarMode           = "minimal"
showSidebarNavigation = true

[browser]
gatherUsageStats = false
